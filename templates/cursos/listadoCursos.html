{% extends "layout.html" %}

{% block container %}

<div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default"
    style="margin-top: 15px;">
    <a href="{{ url_for('cursos.nuevo') }}" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong 
    focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base 
    text-sm px-4 py-2.5 focus:outline-none">Nuevo</a>
    <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="bg-neutral-secondary-soft border-b border-default">
            <tr>
                <th class="px-6 py-3 font-medium">NOMBRE</th>
                <th class="px-6 py-3 font-medium">DESCRIPCION</th>
                <th class="px-6 py-3 font-medium">MAESTRO</th>
                <th class="px-6 py-3 font-medium">ALUMNOS</th>
            </tr>
        </thead>
        <tbody>
            {% for curso in cursos %}
            <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default">
                <td class="px-6 py-4">
                    {{curso.nombre}}
                </td>
                <td class="px-6 py-4">
                    {{curso.descripcion}}
                </td>
                <td class="px-6 py-4">
                    {{curso.maestro.nombre}} {{curso.maestro.apellidos}}
                </td>
                <td class="px-6 py-4">
                    <a href="{{ url_for('cursos.alumnos_curso', curso_id=curso.id) }}"
                        class="font-medium text-fg-brand hover:underline" style="color: purple;">
                        Ver alumnos
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
